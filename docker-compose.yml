version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tg_bot_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: linux
      POSTGRES_DB: moviedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: tg_bot_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data


volumes:
  pgdata:
  redisdata: